<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Rogue Descent favicon: descending chevrons (the game's name + verb) in the
       neon-mint brand green (#33ffcc = PALETTE.player) on the game's dark bg
       (#0a0a12). Bold thick strokes, round joins, no fine detail → legible at 16px.
       A soft blurred under-layer gives the bloom/neon feel without blurring the
       crisp shape on top. Pure SVG, zero raster. -->
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="0.9" />
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0a0a12" />
  <g fill="none" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">
    <!-- glow under-layer: same chevrons, blurred + dimmed (the neon halo) -->
    <g stroke="#33ffcc" opacity="0.55" filter="url(#glow)">
      <polyline points="8,8 16,14 24,8" />
      <polyline points="8,14 16,20 24,14" />
      <polyline points="8,20 16,26 24,20" />
    </g>
    <!-- crisp top layer: the readable shape; bottom chevron in the lighter mint -->
    <g stroke="#33ffcc">
      <polyline points="8,8 16,14 24,8" />
      <polyline points="8,14 16,20 24,14" />
      <polyline points="8,20 16,26 24,20" stroke="#66ffd0" />
    </g>
  </g>
</svg>
