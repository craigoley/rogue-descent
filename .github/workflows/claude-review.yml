name: Claude PR Review & Merge

on:
  pull_request:
    # `ready_for_review` is a deliberate divergence from ClawApp parity (shared
    # across the static-game fleet): visual PRs open as DRAFT, get playtested on
    # device, then are marked "Ready for review" — that transition fires this
    # trigger so the auto-merge runs hands-off. (Drafts still can't be merged:
    # GitHub blocks merging a draft PR, so `gh pr merge` no-ops until the PR is
    # ready.)
    types: [opened, synchronize, ready_for_review]
    # Skip auto-review on PRs that only edit this workflow file. The
    # `anthropics/claude-code-action@v1` action refuses to run when its
    # workflow file differs from the version on `main` (a security check that
    # prevents attackers from PRing malicious workflow edits and having the
    # action execute them under privileged context). On a single-developer
    # personal repo there's no attacker, but the action still self-fails with
    # exit 1 every time, leaving a recurring red ✗ on every workflow-edit PR.
    # `paths-ignore` short-circuits the trigger so the workflow doesn't run at
    # all on those PRs. Comment-driven `@claude` invocations still fire (they're
    # on the `issue_comment` trigger below) to review a workflow-edit PR.
    paths-ignore:
      - '.github/workflows/claude-review.yml'
  issue_comment:
    types: [created]

# Workflow-level default: read-only. The review-and-merge job below overrides
# with the write scopes the action actually needs (contents, pull-requests,
# issues, id-token). Defining the workflow default explicitly so any future job
# added here inherits a minimum-privilege baseline rather than the implicit
# Actions default.
permissions:
  contents: read

concurrency:
  # Scope by EVENT TYPE. Without this, a bot comment (issue_comment — e.g.
  # vercel[bot]'s preview-deploy comment, which lands on every PR) shares the
  # same group as the pull_request review run and, with cancel-in-progress,
  # CANCELS it mid-flight ("Set up job: cancelled") before it can merge. Observed
  # directly: a vercel[bot] comment killed the review run ~2s after it started.
  # Including event_name keeps comment events in their own group; within an event
  # type, cancel-in-progress still supersedes a stale run (a new push cancels an
  # older review of the same PR).
  group: claude-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  review-and-merge:
    # The action pushes commits using ${{ github.token }} (the workflow's
    # default GITHUB_TOKEN), so commits authored by this workflow appear under
    # `github-actions[bot]`, NOT `claude[bot]`. Both guards below check
    # `github-actions[bot]`. If you ever switch to the Claude GitHub App by
    # passing `github_token` to the action, change both checks to `claude[bot]`.
    #
    # TRUST GATE (pull_request path): run only on PRs whose head branch lives in
    # THIS repo (head.repo.full_name == github.repository) — i.e. created by a
    # write-access user, never an outside fork. That is the exact security
    # property the privileged SHA-pinned checkout needs, and it is independent of
    # org-membership visibility.
    #
    # WHY NOT author_association: it was `== OWNER || MEMBER`, but the Actions
    # EVENT payload only reports MEMBER for PUBLIC org members. The operator's
    # membership in this org is PRIVATE, so the payload reported a lesser
    # association, the if was always false, and review-and-merge was SKIPPED on
    # every PR — the auto-merge never ran (all PRs were merged by hand). Evidence:
    # GET /orgs/craigoley/public_members/<user> -> 404 (private) while the
    # authenticated REST API reads MEMBER. The same-repo check is not subject to
    # that visibility quirk. (The issue_comment path below still uses
    # author_association and has the same latent limitation — out of scope here;
    # it is not part of the hands-off auto-merge pipeline.)
    #
    # draft == false preserves the DRAFT GATE: draft PRs are neither reviewed nor
    # merged. Marking a draft "Ready for review" fires ready_for_review (see the
    # trigger above), flips draft to false, and lets the run proceed.
    #
    # Dependabot PRs are SKIPPED — deliberate fleet deviation from ClawApp: a
    # three.js / Vite bump can pass tsc, vitest, CodeQL and OSV yet still break
    # the render and auto-deploy to the public site, so dependency bumps get
    # human review. github-actions[bot] is skipped to prevent self-loops on
    # Claude's push-backs.
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.draft == false &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       github.event.pull_request.user.login != 'dependabot[bot]' &&
       github.event.pull_request.user.login != 'github-actions[bot]' &&
       !contains(github.event.pull_request.head.ref, 'claude-fix'))
      ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER') &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    timeout-minutes: 30
    steps:
      - name: Check last commit author
        id: check-author
        if: github.event_name == 'pull_request'
        run: |
          # The action commits via ${{ github.token }} → author is
          # `github-actions[bot]`. If the workflow authored the last commit we
          # skip, so Claude's own push-backs don't re-trigger an endless loop.
          AUTHOR=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json commits --jq '.commits[-1].authors[0].login // ""')
          if [[ "$AUTHOR" == "github-actions[bot]" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Exit if the workflow authored the last commit
        if: steps.check-author.outputs.skip == 'true'
        run: |
          echo "Last commit was by github-actions[bot] (this workflow) — skipping to prevent loop."
          exit 0

      # Resolve the PR head SHA from the API at trigger time so the subsequent
      # checkout pins to an immutable commit instead of a mutable branch ref.
      # Guards against an Untrusted-Checkout TOCTOU: without it, someone who can
      # push to the PR branch could force-push between the author check above and
      # the checkout, running their code under privileged context.
      - name: Resolve PR head SHA and branch
        id: pr-sha
        if: steps.check-author.outputs.skip != 'true'
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefOid,headRefName)
          SHA=$(echo "$PR_JSON" | jq -r .headRefOid)
          BRANCH=$(echo "$PR_JSON" | jq -r .headRefName)
          if [[ -z "$SHA" || "$SHA" == "null" ]]; then
            echo "Could not resolve head SHA for PR #$PR_NUMBER" >&2
            exit 1
          fi
          if [[ -z "$BRANCH" || "$BRANCH" == "null" ]]; then
            echo "Could not resolve head branch for PR #$PR_NUMBER" >&2
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      # Privileged checkout, reachable from the issue_comment trigger. CodeQL
      # may flag this (actions/untrusted-checkout); the sanitizers are in place:
      #   1. the job-level `if:` requires author_association in (OWNER, MEMBER)
      #      AND, for comments, an `@claude` body — only the owner can fire it.
      #   2. `ref:` is the resolved-at-trigger-time head SHA, not the mutable
      #      branch ref, so a force-push after the trust check can't swap it out.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        if: steps.check-author.outputs.skip != 'true'
        with:
          # SHA-pinned (immutable). NOT `head.ref` — branch refs are mutable and
          # race the `Check last commit author` step above.
          ref: ${{ steps.pr-sha.outputs.sha }}
          fetch-depth: 0

      # Re-attach HEAD to a named local branch matching the PR's head branch.
      # actions/checkout@v6 leaves a detached HEAD when given a SHA, and the
      # action's push-back code is most portable pushing from a named local
      # branch with a matching upstream. If the remote branch was force-pushed
      # since we resolved the SHA, the push is rejected as non-fast-forward —
      # the desired fail-closed behavior.
      - name: Re-attach HEAD to PR branch for push-back
        if: steps.check-author.outputs.skip != 'true'
        # PR head ref names are caller-controlled and could contain shell
        # metacharacters. Pass through env rather than `${{ … }}` interpolation
        # so bash sees the literal string via `$BRANCH` (guards code injection).
        env:
          BRANCH: ${{ steps.pr-sha.outputs.branch }}
        run: |
          git checkout -B "$BRANCH"
          git branch --set-upstream-to="origin/$BRANCH" "$BRANCH" 2>/dev/null || true

      - uses: anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102  # v1
        if: steps.check-author.outputs.skip != 'true'
        with:
          # OAuth via Craig's Max subscription — same auth ClawApp uses.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
            BRANCH: ${{ github.event.pull_request.head.ref || github.head_ref }}

            You are the sole code reviewer for Rogue Descent, a real-time
            twin-stick isometric roguelike dungeon crawler built with TypeScript
            + Three.js + Vite and deployed to Vercel as a static site. Permadeath,
            with LATERAL meta-progression (new options/playstyles between runs,
            not flat power growth). Your job is to review this pull request, fix
            any issues you find, and merge it when it meets quality standards.

            ## Review Phase

            Review the full diff. Post findings as inline review comments.

            ### Project hard rules — flag any violation immediately

            **1. Purity of the game layer (THE load-bearing rule)**
            `src/game/` is pure TypeScript and MUST NOT import 'three' anywhere,
            and MUST NOT touch the DOM (`window`, `document`, `localStorage`,
            event listeners). Any `import ... from 'three'` (or a transitive
            import that pulls three in), or any DOM access, under `src/game/` is a
            hard failure — flag it at the top of your review. Game logic must stay
            runnable and testable in Node with no WebGL. DOM input belongs in
            `src/input/`; rendering belongs in `src/rendering/`, which READS game
            state and never mutates it — flag renderers that write back into game
            state.

            **2. No magic numbers outside utils/constants.ts**
            All tuning values live in `src/utils/constants.ts`. Flag any numeric
            literal used as a tuning/gameplay/dimension value elsewhere (loop
            indices, 0/1 identities and obvious math constants are fine).

            **3. No allocations in the per-frame loop**
            The simulation runs on a FIXED-TIMESTEP accumulator driven by
            `requestAnimationFrame`. Flag object/array/vector allocations inside
            anything reached per frame — the update step and the render sync:
            `new THREE.Vector3()`, `new THREE.Color()`, array/object literals,
            `.map`/`.filter` that allocate, closures created per frame. Vectors,
            scratch objects and entity meshes should be created once and reused
            (bounded pools).

            **4. Touch input parity with keyboard**
            Mobile is required. Any new keyboard control must have an equivalent
            touch path, and vice versa. Flag input changes that add one without
            the other.

            **5. TypeScript strict — no implicit any**
            Flag implicit `any`, unsafe casts (`as any`, non-null `!` that hides a
            real nullable), and types that defeat strict mode.

            ### Also review for
            - Correctness: logic errors, off-by-one, broken edge cases, regressions
            - Whether all callers of a changed function/type were updated
            - Swallowed errors, dead code, duplicated logic

            ### What to ignore
            - Style/formatting (prettier/eslint territory)
            - TODO/FIXME comments (intentional)
            - Lock files, generated files, build artifacts
            - Test code that intentionally exercises edge cases

            ## Fix Phase

            If you find issues:
            1. Fix them directly in the code.
            2. Before committing, verify the change is safe:
               - Run `npx tsc --noEmit` and confirm it's clean.
               - Run `npm test` and confirm the suite is green.
               If either fails, iterate on your fix until both pass — do NOT push
               broken code.
            3. Commit your fixes to the PR branch with a clear commit message.
            4. Push the changes.
            5. Re-review your own fixes to confirm they're correct.

            ## Merge Phase

            After review (and fixes if needed), if the PR meets quality standards:
            1. Post a brief summary comment on the PR noting what you reviewed and
               any fixes made.
            2. Approve the PR.
            3. Merge with: `gh pr merge <number> --squash --delete-branch`
               (NOT `--auto` — this repo has no auto-merge enabled and no branch
               protection rules, so a plain squash-merge runs immediately.)

            If the PR has fundamental issues that can't be auto-fixed (wrong
            approach, needs architectural discussion, missing tests for complex new
            features), post a detailed comment explaining the concerns and do NOT
            merge. Tag @craigoley in that comment so I see it.

          claude_args: |
            --model claude-opus-4-6
            --max-turns 50
            --allowedTools Edit,Write,Read,Bash(git:*),Bash(gh pr:*),Bash(gh api:*),Bash(npx tsc:*),Bash(npm test:*),mcp__github_inline_comment__create_inline_comment
