name: Lighthouse (productionization gate)

# Slice 4 of the productionization track — a STANDING Lighthouse gate so the SEO /
# accessibility / best-practices / performance scores don't silently regress as the
# markup/meta/asset layer evolves.
#
# NON-BLOCKING: the lighthouserc assertions are all "warn" (never "error"), the step
# is continue-on-error, and this workflow is NOT in branch-protection required checks.
# A dipped score surfaces in the PR's Actions log + the temporary-public-storage report
# link; it never fails the build. Thresholds are GAME-APPROPRIATE, set from the measured
# baseline (live prod, LH 13): performance is floored well below 100 because a WebGL game
# ships three.js + paints a canvas — a content-page perf score is neither achievable nor
# the point. a11y/best-practices/seo are held high.
#
# It runs against the LOCAL prod build (lighthouserc collect.staticDistDir = ./dist), so a
# PR is measured on its OWN built output, not whatever happens to be deployed live. The
# DESKTOP preset is used (a stable CI signal — mobile-emulated CPU throttling makes a
# three.js game's perf score wildly variable run-to-run); the human-facing baseline in the
# PR is the default mobile profile, which is why those numbers differ.
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * *' # nightly (08:00 UTC; staggered after the validation sweep at 07:30)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse audit (non-blocking)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # The prod build LHCI will serve + audit (collect.staticDistDir).
      - run: npm run build
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        continue-on-error: true # non-blocking: a dipped score warns, never fails the build
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
