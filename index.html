<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Rogue Descent</title>
    <meta
      name="description"
      content="A twin-stick isometric roguelike. Descend, dodge, build your run."
    />
    <meta name="theme-color" content="#0a0a12" />

    <!-- Open Graph / Twitter — so the URL unfurls with a title, tagline + share card. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rogue Descent" />
    <meta
      property="og:description"
      content="A twin-stick isometric roguelike. Descend, dodge, build your run."
    />
    <meta property="og:url" content="https://rogue-descent.vercel.app" />
    <meta property="og:image" content="https://rogue-descent.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rogue Descent" />
    <meta
      name="twitter:description"
      content="A twin-stick isometric roguelike. Descend, dodge, build your run."
    />
    <meta name="twitter:image" content="https://rogue-descent.vercel.app/og-image.png" />

    <!-- PWA — home-screen install + fullscreen, on-brand dark + chevron icon. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rogue Descent" />

    <!-- Structured data (Schema.org VideoGame) in the INITIAL HTML so crawlers/AI
         that don't run JS still get a machine-readable description of the game. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "VideoGame",
        "name": "Rogue Descent",
        "description": "A real-time twin-stick isometric roguelike dungeon crawler. Descend through procedurally generated floors, dodge and fight, and build your run with stacking powerups.",
        "url": "https://rogue-descent.vercel.app",
        "image": "https://rogue-descent.vercel.app/og-image.png",
        "genre": ["Roguelike", "Action"],
        "applicationCategory": "Game",
        "operatingSystem": "Web browser",
        "gamePlatform": "Web browser",
        "playMode": "SinglePlayer",
        "creator": { "@type": "Organization", "name": "OleyArcade" },
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
  </head>
  <body>
    <!-- The game renders into a WebGL <canvas> appended here by the app. A canvas is
         opaque to crawlers, no-JS visitors, and screen readers, so #app carries an
         accessible name (JS-on SR users) and the <noscript> below describes the game
         in plain DOM text (crawlers / no-JS). Both are non-visual / JS-hidden, so the
         rendered game is unchanged. -->
    <div
      id="app"
      role="application"
      aria-label="Rogue Descent — a twin-stick isometric roguelike, playable in your browser"
    >
      <noscript>
        <section
          style="
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 2rem;
            text-align: center;
            background: #0a0a12;
            color: #cfe;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
          "
        >
          <h1 style="color: #33ffcc; letter-spacing: 0.2em; margin: 0">ROGUE DESCENT</h1>
          <p style="max-width: 42rem; line-height: 1.6; margin: 0">
            Rogue Descent is a real-time twin-stick isometric roguelike dungeon crawler.
            Descend through procedurally generated floors, dodge and fight enemies in fast
            melee-and-ranged combat, and build your run with stacking powerups. Death is
            permanent — every run is different.
          </p>
          <p style="margin: 0; opacity: 0.8">
            This game runs in your browser. Please enable JavaScript to play.
          </p>
        </section>
      </noscript>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
