<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Rogue Descent</title>
    <meta
      name="description"
      content="A twin-stick isometric roguelike. Descend, dodge, build your run."
    />
    <meta name="theme-color" content="#0a0a12" />

    <!-- Open Graph / Twitter — so the URL unfurls with a title, tagline + share card. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rogue Descent" />
    <meta
      property="og:description"
      content="A twin-stick isometric roguelike. Descend, dodge, build your run."
    />
    <meta property="og:url" content="https://rogue-descent.vercel.app" />
    <meta property="og:image" content="https://rogue-descent.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rogue Descent" />
    <meta
      name="twitter:description"
      content="A twin-stick isometric roguelike. Descend, dodge, build your run."
    />
    <meta name="twitter:image" content="https://rogue-descent.vercel.app/og-image.png" />

    <!-- PWA — home-screen install + fullscreen, on-brand dark + chevron icon. -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Rogue Descent" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
